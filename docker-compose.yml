services:
  db:
    image: postgres:16
    container_name: course_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: course_enrollment
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: course_api
    restart: always
    depends_on:
      - db
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/course_enrollment
      SECRET_KEY: "$2b$12$zpalUgxKBd2UAhEta4swJelOWfL5y.9mEIl0mGgF.IpyMPs6EalzK"
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  postgres_data: